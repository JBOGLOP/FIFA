  - {id: 94, home: 81, away: 82}
  - {id: 95, home: 86, away: 88}
  - {id: 96, home: 85, away: 87}
  # Cuartos (97-100)
  - {id: 97,  home: 89, away: 90}
  - {id: 98,  home: 93, away: 94}
  - {id: 99,  home: 91, away: 92}
  - {id: 100, home: 95, away: 96}
